  <div class="container header-inner">
    <a href="index.html" class="logo">
      <span class="lb">LB</span>
      <span class="name">라이프 브리핑</span>

    <nav class="nav" id="nav">
      <a href="index.html#checks">무엇을 점검하나요</a>

      <a href="index.html#process">진행 방식</a>
      <a href="about.html">요한 소개</a>
    </nav>
    <a href="consult.html" class="btn btn-gold btn-nav">무료 점검 신청</a>
    <button class="hamburger" id="hamburger" aria-label="메뉴 열기" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main>
  <section class="section">
    <div class="container form-wrap">
      <div class="brief-rule"><span class="eyebrow">Free Briefing</span><span class="diamond"></span></div>
      <h2>무료 점검 신청</h2>
      <p class="lead" style="margin-bottom:28px">
        아래 세 가지만 남겨주세요. 확인 후 <b style="color:#e7d2a0">문자 또는 카카오톡으로 먼저</b> 연락드립니다.
        갑작스러운 전화는 드리지 않습니다.
      </p>

      <div class="form-card">
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
          <div class="field">
            <label for="name">성함 <span class="req">*</span></label>
            <input type="text" id="name" name="성함" required autocomplete="name" placeholder="예) 김영희">
          </div>
          <div class="field">
            <label for="phone">연락처 (휴대폰) <span class="req">*</span></label>
            <input type="tel" id="phone" name="연락처" required autocomplete="tel" placeholder="예) 010-1234-5678">
          </div>
          <div class="field">
            <label for="topic">궁금한 주제 <span class="req">*</span></label>
            <select id="topic" name="상담주제" required>
              <option value="" disabled selected>선택해주세요</option>
              <option>보험 점검 (내 보험 적정한지 확인)</option>
              <option>정부지원금 확인 (받을 수 있는 지원금)</option>
              <option>실손·건강보험 정리</option>
              <option>기타 / 잘 모르겠어요</option>
            </select>
          </div>
          <div class="field">
            <label for="msg">간단한 상황 설명 (선택)</label>
            <textarea id="msg" name="상황설명" placeholder="예) 실손보험이 2개인 것 같은데 확인하고 싶습니다."></textarea>
          </div>

          <label class="consent">
            <input type="checkbox" name="개인정보동의" value="동의함" required>
            <span>
              상담 연락을 위한 개인정보 수집·이용에 동의합니다.
              수집 항목은 성함·연락처·상담 내용이며, 목적 달성 후 파기됩니다.
              <a href="privacy.html" target="_blank">개인정보처리방침 보기</a>
            </span>
          </label>

          <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
          <input type="hidden" name="_subject" value="[라이프브리핑] 새 무료 점검 신청">

          <button type="submit" class="btn btn-gold" style="width:100%">무료 점검 신청하기</button>
        </form>
        <p class="form-note">보통 24시간 이내에 연락드립니다.</p>

        <div class="kakao-alt">
          폼이 번거로우시면 카카오톡으로 바로 문의하셔도 됩니다.<br>
          카카오톡 ID: <b id="kakaoId">llh5053</b>
          <button type="button" class="copy-btn" id="copyKakao">ID 복사</button>
        </div>
      </div>
    </div>
  </section>
</main>
